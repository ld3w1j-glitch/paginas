<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso admin · Editor visual</title>
  <style>
    :root{--bg:#07120d;--panel:#0c1f16;--line:rgba(236,243,233,.16);--text:#edf7ee;--muted:#b8c9bb;--gold:#f0c94f;--green:#1f8c4c;--green2:#2aae66;}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 80% 10%,rgba(240,201,79,.16),transparent 30%),linear-gradient(180deg,#07120d,#030806)}
    .card{width:min(460px,92vw);background:linear-gradient(180deg,rgba(12,31,22,.96),rgba(7,18,13,.96));border:1px solid var(--line);border-radius:28px;padding:30px;box-shadow:0 24px 70px rgba(0,0,0,.42)}
    .badge{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.10em;text-transform:uppercase}.card h1{margin:10px 0 8px;font-size:34px}.card p{color:var(--muted);line-height:1.5}.field{display:grid;gap:8px;margin:15px 0}.field label{font-weight:800}.field input{width:100%;border:1px solid var(--line);background:rgba(3,8,6,.70);color:var(--text);border-radius:16px;padding:13px 14px;font:inherit}.actions{display:flex;gap:10px;align-items:center;margin-top:20px}.btn{border:1px solid rgba(42,174,102,.65);background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;text-decoration:none;border-radius:999px;padding:13px 18px;font-weight:900;cursor:pointer}.ghost{border-color:rgba(240,201,79,.28);background:rgba(255,255,255,.055);color:var(--text)}.error{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.25);color:#ffb3b3;border-radius:16px;padding:12px;margin:12px 0}.hint{font-size:13px;color:var(--muted);margin-top:16px}
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Área protegida</div>
    <h1>Editor Visual</h1>
    <p>Esta página só abre com o login do administrador.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="field"><label>Login admin</label><input name="username" autocomplete="username" placeholder="usuário admin" required></div>
      <div class="field"><label>Senha</label><input name="password" type="password" autocomplete="current-password" placeholder="Senha do admin" required></div>
      <div class="actions"><button class="btn" type="submit">Entrar</button><a class="btn ghost" href="{{ url_for('portal.index') }}">Voltar para central</a></div>
    </form>
    
  </main>
</body>
</html>
